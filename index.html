<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaSensei Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">Manga<span>Sensei</span></div>
            <nav>
                <ul>
                    <li id="nav-dashboard" class="active" onclick="AppLogic.navigate('dashboard')">📚 <span data-i18n="nav_dash">المكتبة</span></li>
                    <li id="nav-import" onclick="AppLogic.navigate('import')">📥 <span data-i18n="nav_import">استيراد</span></li>
                    <li id="nav-review" onclick="AppLogic.navigate('review')">🔄 <span data-i18n="nav_review">مراجعة</span></li>
                    <li id="nav-settings" onclick="AppLogic.navigate('settings')">⚙️ <span data-i18n="nav_settings">الإعدادات</span></li>
                </ul>
            </nav>
            <div class="user-progress">
                <div class="level-info"><span data-i18n="level">المستوى</span> <span id="user-level">1</span></div>
                <div class="xp-container"><div id="xp-bar-fill"></div></div>
                <small><span id="current-xp">0</span> / 100 XP</small>
            </div>
        </aside>

        <main class="main-content">
            <section id="dashboard-view" class="page-section active">
                <div class="welcome-banner">
                    <h1 data-i18n="welcome">مرحباً بك</h1>
                    <p data-i18n="subtitle">اقرأ وتعلم اللغات بسهولة.</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><span data-i18n="stat_cards">البطاقات</span><strong id="stat-cards-val">0</strong></div>
                    <div class="stat-card accent"><span data-i18n="stat_xp">الخبرة</span><strong id="stat-xp-val">0</strong></div>
                </div>
                <div class="featured-manga" onclick="AppLogic.openReader()">
                    <button class="btn-read" data-i18n="continue">استكمال القراءة ▶️</button>
                </div>
            </section>

            <section id="import-view" class="page-section">
                <div class="glass-panel">
                    <h2 data-i18n="import_title">📥 استيراد</h2>
                    <div class="input-group">
                        <input type="text" id="manga-url-input" placeholder="Webtoons URL...">
                        <button class="btn-action" onclick="AppLogic.handleImport()" data-i18n="btn_import">تحميل</button>
                    </div>
                    <div id="import-log"></div>
                </div>
            </section>

            <section id="settings-view" class="page-section">
                <div class="glass-panel">
                    <h2 data-i18n="settings_title">⚙️ الإعدادات</h2>
                    <select id="ui-lang-selector" onchange="AppLogic.updateUILang()">
                        <option value="ar">العربية</option>
                        <option value="en">English</option>
                    </select>
                    <button class="btn-danger" onclick="AppLogic.factoryReset()" data-i18n="reset">إعادة ضبط 🗑️</button>
                </div>
            </section>
        </main>
    </div>

    <div id="reader-overlay" class="reader-view">
        <header class="reader-top-bar">
            <button class="btn-close" onclick="AppLogic.closeReader()">⬅️ <span data-i18n="close">إغلاق</span></button>
            <h4 data-i18n="hint">ظلل النص للنطق</h4>
        </header>
        <div id="manga-scroll-view" class="manga-images-container"></div>
    </div>

    <script src="audio-engine.js"></script>
    <script src="app-logic.js"></script>
</body>
</html>
